<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city..."
                    class="search-input"
                >
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </header>

        <!-- Current Weather Section -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading weather data...</p>
            </div>
        </section>

        <!-- Weather Details Grid -->
        <section class="weather-details" id="weatherDetails">
        </section>

        <!-- 5-Day Forecast -->
        <section class="forecast-section">
            <h2>5-Day Forecast</h2>
            <div class="forecast-container" id="forecastContainer">
            </div>
        </section>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <p id="errorText"></p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Weather data powered by OpenWeatherMap API</p>
            <p class="api-note">Free API Key required. Sign up at <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
